[mypy]
python_version = 3.11
disallow_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True

[mypy.flask.*]
ignore_missing_imports = True

[mypy.flask_sqlalchemy.*]
ignore_missing_imports = True

[mypy.factory.*]
ignore_missing_imports = True

[mypy.faker.*]
ignore_missing_imports = True
